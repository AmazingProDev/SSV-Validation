<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSV Drive Test Analyzer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0b1120;
      --surface:   #141c2f;
      --card:      #1a2540;
      --border:    #253252;
      --border2:   #2d3f62;
      --accent:    #f43f5e;
      --accent2:   #fb7185;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --muted2:    #94a3b8;
      --green:     #22c55e;
      --red:       #ef4444;
      --purple:    #8b5cf6;
      --blue:      #0ea5e9;
      --amber:     #f59e0b;
      --teal:      #06b6d4;
      --emerald:   #10b981;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────────────────────────── */
    .header {
      background: linear-gradient(135deg, #141c2f, #1e2d4a);
      border-bottom: 2px solid var(--accent);
      padding: 18px 36px;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .header-logo {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--accent), #c2185b);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .header-text h1 { font-size: 20px; color: #f8fafc; font-weight: 700; }
    .header-text p  { font-size: 12px; color: var(--muted2); margin-top: 2px; }

    /* ── Main ────────────────────────────────────────────────────────────── */
    .container { max-width: 1400px; margin: 0 auto; padding: 32px 24px; }

    /* ── Upload zone ─────────────────────────────────────────────────────── */
    .upload-zone {
      border: 2px dashed var(--border2);
      border-radius: 16px;
      padding: 56px 40px;
      text-align: center;
      cursor: pointer;
      background: var(--surface);
      transition: all .3s;
    }
    .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); box-shadow: 0 0 40px rgba(244,63,94,.12); }
    .upload-zone input[type=file] { display: none; }
    .upload-icon {
      width: 64px; height: 64px; margin: 0 auto 18px;
      background: linear-gradient(135deg, #1e2d4a, #253252);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
    }
    .upload-zone h2 { font-size: 20px; color: #f8fafc; margin-bottom: 8px; }
    .upload-zone p  { color: var(--muted); font-size: 14px; }
    .upload-hint {
      display: inline-flex; align-items: center; gap: 8px;
      margin-top: 20px; padding: 8px 20px;
      background: var(--card); border: 1px solid var(--border2);
      border-radius: 20px; font-size: 12px; color: var(--muted2);
    }

    /* ── Progress ────────────────────────────────────────────────────────── */
    .progress { display: none; background: var(--surface); border-radius: 14px; padding: 24px; margin: 24px 0; }
    .progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 12px; }
    .progress-fill {
      height: 100%; border-radius: 3px; width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width .4s ease;
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer {
      0%,100% { opacity: 1; }
      50%      { opacity: .7; }
    }
    .progress-status { font-size: 13px; color: var(--muted2); }

    /* ── Results ─────────────────────────────────────────────────────────── */
    .results { display: none; }

    .results-summary {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
    }
    .results-summary h2 { font-size: 18px; color: #f8fafc; }
    .summary-pills { display: flex; gap: 8px; flex-wrap: wrap; }
    .pill {
      padding: 4px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
      border: 1px solid;
    }
    .pill-red    { background: rgba(239,68,68,.15);  border-color: rgba(239,68,68,.4);  color: #fca5a5; }
    .pill-green  { background: rgba(34,197,94,.15);  border-color: rgba(34,197,94,.4);  color: #86efac; }
    .pill-purple { background: rgba(139,92,246,.15); border-color: rgba(139,92,246,.4); color: #c4b5fd; }

    /* ── SSV Status banner (summary page) ────────────────────────────────── */
    .ssv-status {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 52px 24px; border-radius: 16px;
      text-align: center; margin-bottom: 32px;
    }
    .ssv-status.ok  { background: rgba(34,197,94,.09);  border: 2px solid rgba(34,197,94,.35); }
    .ssv-status.nok { background: rgba(239,68,68,.09);  border: 2px solid rgba(239,68,68,.35); }
    .ssv-status-icon  { font-size: 56px; line-height: 1; margin-bottom: 18px; }
    .ssv-status-title { font-size: 48px; font-weight: 800; letter-spacing: 3px; }
    .ssv-status.ok  .ssv-status-title { color: #4ade80; }
    .ssv-status.nok .ssv-status-title { color: #f87171; }
    .ssv-status-sub   { font-size: 14px; color: var(--muted2); margin-top: 10px; }

    .nok-sheet-section { margin-bottom: 32px; }
    .nok-sheet-label {
      font-size: 12px; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; color: var(--muted); margin-bottom: 14px;
      padding-bottom: 8px; border-bottom: 1px solid var(--border);
    }

    /* ── Sheet tabs ──────────────────────────────────────────────────────── */
    .sheet-tabs { display: flex; gap: 0; margin-bottom: 0; overflow-x: auto; }
    .sheet-tab {
      padding: 11px 22px; cursor: pointer; border-radius: 10px 10px 0 0;
      font-size: 13px; font-weight: 500; color: var(--muted2);
      background: var(--surface); border: 1px solid var(--border);
      border-bottom: none; margin-right: 4px; white-space: nowrap;
      transition: all .2s;
    }
    .sheet-tab:hover  { color: #f8fafc; background: var(--card); }
    .sheet-tab.active { color: #f8fafc; background: var(--card); border-color: var(--border2); }
    .sheet-tab-badge  {
      display: inline-block; margin-left: 8px; padding: 1px 7px;
      border-radius: 10px; font-size: 11px; font-weight: 700;
    }

    /* ── Sheet panel ─────────────────────────────────────────────────────── */
    .sheet-panel {
      display: none; background: var(--card); border-radius: 0 12px 12px 12px;
      border: 1px solid var(--border2); padding: 24px;
    }
    .sheet-panel.active { display: block; }

    /* ── Show all toggle bar ─────────────────────────────────────────────── */
    .toggle-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; margin-bottom: 20px;
      background: var(--surface); border: 1px solid var(--border2);
      border-radius: 10px;
    }
    .toggle-bar-info {
      font-size: 13px; color: var(--muted2);
      display: flex; align-items: center; gap: 8px;
    }
    .toggle-btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 7px 18px; border-radius: 8px; cursor: pointer;
      font-size: 13px; font-weight: 600;
      background: var(--card); border: 1px solid var(--border2);
      color: var(--muted2); transition: all .2s;
    }
    .toggle-btn:hover { background: var(--border2); color: #f8fafc; }
    .toggle-btn.active { background: rgba(244,63,94,.15); border-color: rgba(244,63,94,.4); color: #fb7185; }

    /* ── No-degradation notice ───────────────────────────────────────────── */
    .no-degradation-notice {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 18px; margin-bottom: 20px;
      background: rgba(34,197,94,.08); border: 1px solid rgba(34,197,94,.3);
      border-radius: 10px; font-size: 13px; color: #86efac;
    }

    /* ── Image list (single column, full-width cards) ────────────────────── */
    .image-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Image card ──────────────────────────────────────────────────────── */
    .img-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color .2s;
    }
    .img-card:hover { border-color: var(--border2); }

    .img-card-header {
      padding: 12px 16px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .img-type-badge {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 4px 12px; border-radius: 20px;
      font-size: 12px; font-weight: 600;
      border: 1px solid;
    }
    .img-label {
      font-size: 11px; color: var(--muted);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* Result badge */
    .result-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 14px; border-radius: 20px;
      font-size: 12px; font-weight: 700;
    }
    .result-badge.cross    { background: rgba(239,68,68,.2);  color: #fca5a5; border: 1px solid rgba(239,68,68,.5);  }
    .result-badge.no-cross { background: rgba(34,197,94,.2);  color: #86efac; border: 1px solid rgba(34,197,94,.5);  }
    .result-badge.zones    { background: rgba(239,68,68,.2);  color: #fca5a5; border: 1px solid rgba(239,68,68,.5);  }
    .result-badge.clean    { background: rgba(34,197,94,.2);  color: #86efac; border: 1px solid rgba(34,197,94,.5);  }
    .result-badge.geo      { background: rgba(100,116,139,.2); color: #94a3b8; border: 1px solid rgba(100,116,139,.4); }

    /* ── Side-by-side original / analyzed ───────────────────────────────── */
    .img-compare {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border);
    }
    .img-panel { background: var(--surface); padding: 12px; }
    .img-panel-label {
      font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
      color: var(--muted); margin-bottom: 8px;
    }
    .img-panel img {
      width: 100%; border-radius: 6px; cursor: zoom-in;
      transition: transform .2s; display: block;
      max-height: 480px; object-fit: contain; background: #0b1120;
    }
    .img-panel img:hover { transform: scale(1.01); }

    /* Download btn */
    .dl-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 12px; background: var(--card); border: 1px solid var(--border2);
      border-radius: 8px; color: var(--muted2); font-size: 12px;
      text-decoration: none; cursor: pointer; transition: all .2s;
    }
    .dl-btn:hover { background: var(--border); color: #f8fafc; }

    /* ── Lightbox ─────────────────────────────────────────────────────────── */
    .lightbox {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.93); z-index: 9999;
      align-items: center; justify-content: center; cursor: zoom-out;
    }
    .lightbox.open { display: flex; }
    .lightbox img  { max-width: 96%; max-height: 94vh; border-radius: 8px; box-shadow: 0 0 60px rgba(0,0,0,.8); }

    /* ── Responsive ──────────────────────────────────────────────────────── */
    @media (max-width: 700px) {
      .img-compare { grid-template-columns: 1fr; }
      .header      { padding: 14px 16px; }
      .container   { padding: 20px 12px; }
    }
  </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────────── -->
<div class="header">
  <div class="header-logo">📡</div>
  <div class="header-text">
    <h1>SSV Drive Test Analyzer</h1>
    <p>2G &bull; 3G &bull; LTE &bull; 5G &bull; VoLTE</p>
  </div>
</div>

<div class="container">

  <!-- ── Upload zone ───────────────────────────────────────────────────── -->
  <div class="upload-zone" id="uploadZone">
    <div class="upload-icon">📂</div>
    <h2>Upload SSV Excel Report</h2>
    <p>Drop your .xlsx file here or click to browse</p>
    <div class="upload-hint">
      <span>📋</span>
      <span>Supports multi-sheet reports &mdash; Serving Cell · Coverage · Quality · DL/UL Throughput</span>
    </div>
    <input type="file" id="fileInput" accept=".xlsx">
  </div>

  <!-- ── Progress ──────────────────────────────────────────────────────── -->
  <div class="progress" id="progress">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-status" id="progressStatus">Uploading…</div>
  </div>

  <!-- ── Results ───────────────────────────────────────────────────────── -->
  <div class="results" id="results">

    <div class="results-summary">
      <h2 id="summaryTitle"></h2>
      <div class="summary-pills" id="summaryPills"></div>
    </div>

    <div class="sheet-tabs"   id="sheetTabs"></div>
    <div class="sheet-panels" id="sheetPanels"></div>

  </div>
</div>

<!-- ── Lightbox ──────────────────────────────────────────────────────────── -->
<div class="lightbox" id="lightbox">
  <img id="lightboxImg" src="" alt="">
</div>

<script>
// ── DOM refs ──────────────────────────────────────────────────────────────
const uploadZone     = document.getElementById('uploadZone');
const fileInput      = document.getElementById('fileInput');
const progressEl     = document.getElementById('progress');
const progressFill   = document.getElementById('progressFill');
const progressStatus = document.getElementById('progressStatus');
const resultsEl      = document.getElementById('results');
const summaryTitle   = document.getElementById('summaryTitle');
const summaryPills   = document.getElementById('summaryPills');
const sheetTabs      = document.getElementById('sheetTabs');
const sheetPanels    = document.getElementById('sheetPanels');
const lightbox       = document.getElementById('lightbox');
const lightboxImg    = document.getElementById('lightboxImg');

// ── Upload interactions ───────────────────────────────────────────────────
uploadZone.addEventListener('click',     () => fileInput.click());
uploadZone.addEventListener('dragover',  e  => { e.preventDefault(); uploadZone.classList.add('drag'); });
uploadZone.addEventListener('dragleave', ()  => uploadZone.classList.remove('drag'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('drag');
  if (e.dataTransfer.files.length) handleUpload(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => { if (fileInput.files.length) handleUpload(fileInput.files[0]); });

function handleUpload(file) {
  if (!file.name.toLowerCase().endsWith('.xlsx')) { alert('Please upload an .xlsx file'); return; }

  const fd = new FormData();
  fd.append('file', file);

  progressEl.style.display = 'block';
  resultsEl.style.display  = 'none';
  progressFill.style.width  = '25%';
  progressStatus.textContent = 'Uploading file…';

  setTimeout(() => { progressFill.style.width = '55%'; progressStatus.textContent = 'Parsing sheets & images…'; }, 400);

  fetch('/upload', { method: 'POST', body: fd })
    .then(r => r.json())
    .then(data => {
      progressFill.style.width   = '100%';
      progressStatus.textContent = data.error ? 'Error: ' + data.error : 'Analysis complete!';
      if (data.error) return;
      setTimeout(() => { progressEl.style.display = 'none'; renderResults(data); }, 500);
    })
    .catch(err => { progressStatus.textContent = 'Error: ' + err.message; });
}

// ── Helpers ───────────────────────────────────────────────────────────────
function escHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/** Returns true when an image has a detected problem (cross or zones). */
function hasDegradation(img) {
  if (!img.result) return false;
  if (img.result.kind === 'cross') return !!img.result.cross_detected;
  if (img.result.kind === 'zones') return !!(img.result.zones && img.result.zones.length > 0);
  if (img.result.kind === 'error') return true;
  return false;
}

/** Returns true for image types we want to display (hide geo). */
function shouldShow(img) { return img.type !== 'geo'; }

// Display order: serving_cell → coverage → quality → DL → UL (geo hidden)
const TYPE_ORDER = ['serving_cell', 'coverage', 'quality', 'dl_throughput', 'ul_throughput', 'unknown'];

const TYPE_COLORS = {
  geo:          '#64748b',
  serving_cell: '#8b5cf6',
  coverage:     '#0ea5e9',
  quality:      '#f59e0b',
  dl_throughput:'#10b981',
  ul_throughput:'#06b6d4',
  unknown:      '#94a3b8',
};

// ── Render all results ────────────────────────────────────────────────────
function renderResults(data) {
  sheetTabs.innerHTML    = '';
  sheetPanels.innerHTML  = '';
  summaryPills.innerHTML = '';

  // Gather all displayable images across all sheets
  let allNokImages = [];   // {img, sheetName}
  let totalAnalyzed = 0;
  data.sheets.forEach(s => {
    s.images.filter(shouldShow).forEach(img => {
      totalAnalyzed++;
      if (hasDegradation(img)) allNokImages.push({ img, sheetName: s.sheet_name });
    });
  });
  const isNok = allNokImages.length > 0;

  summaryTitle.textContent = `${data.filename} — ${data.sheets.length} sheet(s) analyzed`;
  if (isNok) {
    summaryPills.innerHTML = `<span class="pill pill-red">&#10005; ${allNokImages.length} NOK</span>`;
  } else {
    summaryPills.innerHTML = `<span class="pill pill-green">&#10003; SSV OK</span>`;
  }

  // ── Tab 0: Summary ──────────────────────────────────────────────────────
  const sumTab = document.createElement('div');
  sumTab.className = 'sheet-tab active';
  sumTab.id = 'tab-summary';
  sumTab.textContent = '📋 Summary';
  sumTab.addEventListener('click', () => switchTab('summary'));
  sheetTabs.appendChild(sumTab);

  const sumPanel = document.createElement('div');
  sumPanel.className = 'sheet-panel active';
  sumPanel.id = 'panel-summary';
  sumPanel.appendChild(buildSummaryPanel(isNok, allNokImages, totalAnalyzed, data.sheets.length));
  sheetPanels.appendChild(sumPanel);

  // ── Sheet tabs ──────────────────────────────────────────────────────────
  data.sheets.forEach((sheet, idx) => {
    const visibleImgs = sheet.images.filter(shouldShow);
    const issueCount  = visibleImgs.filter(hasDegradation).length;
    const badgeStyle  = issueCount
      ? 'background:rgba(239,68,68,.25);color:#fca5a5;'
      : 'background:rgba(34,197,94,.25);color:#86efac;';

    const tab = document.createElement('div');
    tab.className = 'sheet-tab';
    tab.id = `tab-sheet-${idx}`;
    tab.innerHTML = `${escHtml(sheet.sheet_name)}
      <span class="sheet-tab-badge" style="${badgeStyle}">${issueCount || '&#10003;'}</span>`;
    tab.addEventListener('click', () => switchTab(`sheet-${idx}`));
    sheetTabs.appendChild(tab);

    const panel = document.createElement('div');
    panel.className = 'sheet-panel';
    panel.id = `panel-sheet-${idx}`;
    panel.appendChild(buildSheetPanel(sheet));
    sheetPanels.appendChild(panel);
  });

  resultsEl.style.display = 'block';
  window.scrollTo({ top: resultsEl.offsetTop - 20, behavior: 'smooth' });
}

function switchTab(id) {
  document.querySelectorAll('.sheet-tab')  .forEach(t => t.classList.toggle('active', t.id === `tab-${id}`));
  document.querySelectorAll('.sheet-panel').forEach(p => p.classList.toggle('active', p.id === `panel-${id}`));
}

// ── Build the summary panel ───────────────────────────────────────────────
function buildSummaryPanel(isNok, nokItems, totalAnalyzed, sheetCount) {
  const container = document.createElement('div');

  // Status banner
  const banner = document.createElement('div');
  banner.className = `ssv-status ${isNok ? 'nok' : 'ok'}`;
  if (isNok) {
    banner.innerHTML = `
      <div class="ssv-status-icon">✗</div>
      <div class="ssv-status-title">SSV NOK</div>
      <div class="ssv-status-sub">${nokItems.length} degradation(s) detected across ${sheetCount} sheet(s)</div>`;
  } else {
    banner.innerHTML = `
      <div class="ssv-status-icon">✓</div>
      <div class="ssv-status-title">SSV OK</div>
      <div class="ssv-status-sub">All ${totalAnalyzed} analyzed parameter(s) are within limits</div>`;
  }
  container.appendChild(banner);

  if (!isNok) return container;

  // Group NOK images by sheet
  const bySheet = {};
  nokItems.forEach(({ img, sheetName }) => {
    if (!bySheet[sheetName]) bySheet[sheetName] = [];
    bySheet[sheetName].push(img);
  });

  Object.entries(bySheet).forEach(([sheetName, imgs]) => {
    const section = document.createElement('div');
    section.className = 'nok-sheet-section';

    const label = document.createElement('div');
    label.className = 'nok-sheet-label';
    label.textContent = sheetName;
    section.appendChild(label);

    // Sort NOK images by TYPE_ORDER
    const sorted = [...imgs].sort(
      (a, b) => TYPE_ORDER.indexOf(a.type) - TYPE_ORDER.indexOf(b.type)
    );

    const list = document.createElement('div');
    list.className = 'image-list';
    sorted.forEach(img => list.appendChild(buildImageCard(img)));
    section.appendChild(list);
    container.appendChild(section);
  });

  return container;
}

// ── Build a sheet's content ───────────────────────────────────────────────
function buildSheetPanel(sheet) {
  const container = document.createElement('div');

  // Filter out geo images; sort by TYPE_ORDER
  const sorted = sheet.images
    .filter(shouldShow)
    .sort((a, b) => TYPE_ORDER.indexOf(a.type) - TYPE_ORDER.indexOf(b.type));

  const degraded = sorted.filter(hasDegradation);
  const clean    = sorted.filter(img => !hasDegradation(img));

  if (degraded.length === 0) {
    // All clean — show full analysis with green notice
    const notice = document.createElement('div');
    notice.className = 'no-degradation-notice';
    notice.innerHTML = `
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/>
        <polyline points="22 4 12 14.01 9 11.01"/>
      </svg>
      No degradations detected — showing full analysis`;
    container.appendChild(notice);

    const list = document.createElement('div');
    list.className = 'image-list';
    sorted.forEach(img => list.appendChild(buildImageCard(img)));
    container.appendChild(list);

  } else {
    // Show degraded first; hide clean behind toggle
    if (clean.length > 0) {
      const toggleBar = document.createElement('div');
      toggleBar.className = 'toggle-bar';

      const info = document.createElement('div');
      info.className = 'toggle-bar-info';
      info.innerHTML = `
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2.5">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        Showing <strong style="color:#f8fafc;">${degraded.length}</strong> degraded image(s) of ${sorted.length} total`;

      const btn = document.createElement('button');
      btn.className = 'toggle-btn';
      btn.innerHTML = `
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        Show all analysis (${clean.length} more)`;

      toggleBar.appendChild(info);
      toggleBar.appendChild(btn);
      container.appendChild(toggleBar);

      const cleanList = document.createElement('div');
      cleanList.className = 'image-list';
      cleanList.style.display = 'none';
      cleanList.style.marginTop = '20px';
      clean.forEach(img => cleanList.appendChild(buildImageCard(img)));

      btn.addEventListener('click', () => {
        const isHidden = cleanList.style.display === 'none';
        cleanList.style.display = isHidden ? 'flex' : 'none';
        cleanList.style.flexDirection = 'column';
        btn.classList.toggle('active', isHidden);
        btn.innerHTML = isHidden
          ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
               <polyline points="18 15 12 9 6 15"/>
             </svg> Show degradations only`
          : `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
               <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
             </svg> Show all analysis (${clean.length} more)`;
        if (isHidden)
          setTimeout(() => cleanList.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
      });

      const degradedList = document.createElement('div');
      degradedList.className = 'image-list';
      degraded.forEach(img => degradedList.appendChild(buildImageCard(img)));
      container.appendChild(degradedList);
      container.appendChild(cleanList);

    } else {
      // All images degraded
      const list = document.createElement('div');
      list.className = 'image-list';
      degraded.forEach(img => list.appendChild(buildImageCard(img)));
      container.appendChild(list);
    }
  }

  return container;
}

// ── Build one image card ──────────────────────────────────────────────────
function buildImageCard(img) {
  const card = document.createElement('div');
  card.className = 'img-card';
  const color = TYPE_COLORS[img.type] || '#94a3b8';

  const header = document.createElement('div');
  header.className = 'img-card-header';
  header.innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;min-width:0;flex:1;">
      <span class="img-type-badge"
            style="color:${color};border-color:${color}40;background:${color}18;flex-shrink:0;">
        ${escHtml(img.type_label)}
      </span>
      <span class="img-label" title="${escHtml(img.label)}">${escHtml(img.label)}</span>
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-shrink:0;margin-left:12px;">
      ${buildResultBadge(img.result)}
      <span class="dl-btn" title="Right-click to save image">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
        </svg>
      </span>
    </div>`;
  card.appendChild(header);

  const compare = document.createElement('div');
  compare.className = 'img-compare';
  const origSrc = img.original_b64 ? `data:image/png;base64,${img.original_b64}` : img.original;
  const analSrc = img.analyzed_b64 ? `data:image/png;base64,${img.analyzed_b64}` : img.analyzed;
  compare.innerHTML = `
    <div class="img-panel">
      <div class="img-panel-label">Original</div>
      <img src="${origSrc}" loading="lazy" onclick="openLB('${origSrc.replace(/'/g, "\\'")}')">
    </div>
    <div class="img-panel">
      <div class="img-panel-label">Analyzed</div>
      <img src="${analSrc}" loading="lazy" onclick="openLB('${analSrc.replace(/'/g, "\\'")}')">
    </div>`;
  card.appendChild(compare);
  return card;
}

function buildResultBadge(result) {
  if (!result) return '';
  if (result.kind === 'cross') {
    const tip = result.cross_detected
      ? `misassigned=${result.misassigned_ratio ?? '?'} mixed=${result.mixed_bin_ratio ?? '?'} intrusion=${result.max_intrusion_ratio ?? '?'}`
      : (result.reason ? `reason: ${result.reason}` : `misassigned=${result.misassigned_ratio ?? '?'} mixed=${result.mixed_bin_ratio ?? '?'} intrusion=${result.max_intrusion_ratio ?? '?'}`);
    return result.cross_detected
      ? `<span class="result-badge cross"   title="${escHtml(tip)}">&#10005; Cross Detected</span>`
      : `<span class="result-badge no-cross" title="${escHtml(tip)}">&#10003; No Cross</span>`;
  }
  if (result.kind === 'zones') {
    const n = result.zones ? result.zones.length : 0;
    return n ? `<span class="result-badge zones">NOK</span>`
             : `<span class="result-badge clean">OK</span>`;
  }
  if (result.kind === 'error')
    return `<span class="result-badge" style="background:rgba(239,68,68,.2);color:#fca5a5;border:1px solid rgba(239,68,68,.4);">&#9888; Error</span>`;
  return '';
}

// ── Lightbox ──────────────────────────────────────────────────────────────
function openLB(src) {
  lightboxImg.src = src;
  lightbox.classList.add('open');
}
lightbox.addEventListener('click', () => lightbox.classList.remove('open'));
document.addEventListener('keydown', e => { if (e.key === 'Escape') lightbox.classList.remove('open'); });
</script>
</body>
